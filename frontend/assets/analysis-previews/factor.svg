<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180">
  <defs>
    <linearGradient id="legend-f" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff5f0"/>
      <stop offset="50%" stop-color="#fb6a4a"/>
      <stop offset="100%" stop-color="#99000d"/>
    </linearGradient>
  </defs>
  <rect width="280" height="180" fill="#1a1a2e"/>
  <!-- 4x5 矩阵（暗色底 + 圆角色格 + 微间距） -->
  <g>
    <!-- Row 1: 应用领域 A1 -->
    <rect x="46"  y="20" width="42" height="24" rx="4" fill="#fff5f0" opacity="0.85"/>
    <rect x="92"  y="20" width="42" height="24" rx="4" fill="#fcbba1" opacity="0.85"/>
    <rect x="138" y="20" width="42" height="24" rx="4" fill="#fb6a4a" opacity="0.85"/>
    <rect x="184" y="20" width="42" height="24" rx="4" fill="#cb181d" opacity="0.85"/>
    <rect x="230" y="20" width="42" height="24" rx="4" fill="#99000d" opacity="0.85"/>
    <!-- Row 2: A2 -->
    <rect x="46"  y="48" width="42" height="24" rx="4" fill="#fcbba1" opacity="0.85"/>
    <rect x="92"  y="48" width="42" height="24" rx="4" fill="#fb6a4a" opacity="0.85"/>
    <rect x="138" y="48" width="42" height="24" rx="4" fill="#ef3b2c" opacity="0.85"/>
    <rect x="184" y="48" width="42" height="24" rx="4" fill="#cb181d" opacity="0.85"/>
    <rect x="230" y="48" width="42" height="24" rx="4" fill="#fcbba1" opacity="0.85"/>
    <!-- Row 3: A3 -->
    <rect x="46"  y="76" width="42" height="24" rx="4" fill="#fff5f0" opacity="0.85"/>
    <rect x="92"  y="76" width="42" height="24" rx="4" fill="#fcbba1" opacity="0.85"/>
    <rect x="138" y="76" width="42" height="24" rx="4" fill="#fb6a4a" opacity="0.85"/>
    <rect x="184" y="76" width="42" height="24" rx="4" fill="#fcbba1" opacity="0.85"/>
    <rect x="230" y="76" width="42" height="24" rx="4" fill="#fb6a4a" opacity="0.85"/>
    <!-- Row 4: A4 -->
    <rect x="46"  y="104" width="42" height="24" rx="4" fill="#fcbba1" opacity="0.85"/>
    <rect x="92"  y="104" width="42" height="24" rx="4" fill="#fff5f0" opacity="0.85"/>
    <rect x="138" y="104" width="42" height="24" rx="4" fill="#fcbba1" opacity="0.85"/>
    <rect x="184" y="104" width="42" height="24" rx="4" fill="#fb6a4a" opacity="0.85"/>
    <rect x="230" y="104" width="42" height="24" rx="4" fill="#ef3b2c" opacity="0.85"/>
  </g>
  <!-- 行列标签 -->
  <g font-family="Inter,-apple-system,system-ui,sans-serif" font-size="8" fill="#888" text-anchor="middle" font-weight="500">
    <text x="67" y="16">F1</text><text x="113" y="16">F2</text><text x="159" y="16">F3</text><text x="205" y="16">F4</text><text x="251" y="16">F5</text>
    <text x="38" y="36" text-anchor="end">A1</text>
    <text x="38" y="64" text-anchor="end">A2</text>
    <text x="38" y="92" text-anchor="end">A3</text>
    <text x="38" y="120" text-anchor="end">A4</text>
  </g>
  <!-- 色阶图例 -->
  <rect x="46" y="148" width="226" height="7" rx="3.5" fill="url(#legend-f)"/>
  <text x="46" y="170" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="7.5" fill="#555">Low</text>
  <text x="272" y="170" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="7.5" fill="#555" text-anchor="end">High</text>
</svg>
