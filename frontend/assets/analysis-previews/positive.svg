  <path d="M90,0 Q84,55 94,110 T86,180" stroke="#252545" stroke-width="0.8" fill="none"/>
  <!-- 绿色热力叠加 -->
  <rect width="280" height="180" fill="url(#pg1)"/>
  <rect width="280" height="180" fill="url(#pg2)"/>
  <!-- 微弱数据点 -->
