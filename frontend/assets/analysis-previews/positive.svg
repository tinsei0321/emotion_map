<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180">
  <defs>
    <radialGradient id="pg1" cx="40%" cy="44%" r="34%">
      <stop offset="0%" stop-color="#083D08" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#2AA02A" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="#6DD06D" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A8E6A0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pg2" cx="68%" cy="58%" r="26%">
