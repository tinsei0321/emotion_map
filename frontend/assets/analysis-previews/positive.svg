      <stop offset="50%" stop-color="#3DBA3D" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A8E6A0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="legend-p" x1="0" y1="0" x2="1" y2="0">
