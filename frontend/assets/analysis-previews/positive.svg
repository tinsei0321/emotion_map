    <circle cx="96" cy="70" r="1.3" fill="#3DBA3D"/>
    <circle cx="112" cy="56" r="1.1" fill="#2AA02A"/>
    <circle cx="82" cy="82" r="1.5" fill="#1DB01D"/>
    <circle cx="122" cy="74" r="1" fill="#3DBA3D"/>
    <circle cx="102" cy="90" r="1.2" fill="#2AA02A"/>
    <circle cx="88" cy="48" r="0.9" fill="#3DBA3D"/>
    <circle cx="132" cy="64" r="1.3" fill="#1DB01D"/>
    <circle cx="142" cy="80" r="1.1" fill="#2AA02A"/>
    <circle cx="74" cy="66" r="0.9" fill="#3DBA3D"/>
    <circle cx="152" cy="72" r="1.3" fill="#1DB01D"/>
    <circle cx="116" cy="44" r="0.9" fill="#3DBA3D"/>
