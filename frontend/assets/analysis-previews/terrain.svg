<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180">
  <defs>
    <radialGradient id="h1" cx="38%" cy="42%" r="32%">
      <stop offset="0%" stop-color="#FF4136" stop-opacity="0.85"/>
      <stop offset="25%" stop-color="#FF851B" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#FFDC00" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#2ECC40" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="h2" cx="68%" cy="56%" r="26%">
      <stop offset="0%" stop-color="#FF4136" stop-opacity="0.65"/>
      <stop offset="35%" stop-color="#FF851B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFDC00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="h3" cx="52%" cy="28%" r="18%">
      <stop offset="0%" stop-color="#FF851B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2ECC40" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="legend-t" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0074D9"/>
      <stop offset="25%" stop-color="#2ECC40"/>
      <stop offset="50%" stop-color="#FFDC00"/>
      <stop offset="75%" stop-color="#FF851B"/>
      <stop offset="100%" stop-color="#FF4136"/>
    </linearGradient>
  </defs>
  <rect width="280" height="180" fill="#1a1a2e"/>
  <!-- 暗色底图线 -->
  <path d="M0,92 Q70,86 140,96 T280,90" stroke="#252545" stroke-width="1.5" fill="none"/>
