  <!-- 色阶图例 -->
  <rect x="16" y="150" width="110" height="7" rx="3.5" fill="url(#legend-t)"/>
  <text x="16" y="172" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="7.5" fill="#555">Low</text>
  <text x="126" y="172" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="7.5" fill="#555" text-anchor="end">High</text>
