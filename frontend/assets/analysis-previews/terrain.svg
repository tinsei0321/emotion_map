  <path d="M82,0 Q76,60 86,120 T78,180" stroke="#252545" stroke-width="1" fill="none"/>
  <path d="M198,0 Q193,50 204,100 T196,180" stroke="#252545" stroke-width="0.8" fill="none"/>
  <!-- 热力叠加 -->
  <rect width="280" height="180" fill="url(#h1)"/>
  <rect width="280" height="180" fill="url(#h2)"/>
  <rect width="280" height="180" fill="url(#h3)"/>
  <!-- 微弱数据点 -->
  <g opacity="0.22">
    <circle cx="92" cy="70" r="1.2" fill="#fff"/>
    <circle cx="108" cy="56" r="1" fill="#fff"/>
    <circle cx="80" cy="80" r="1.3" fill="#fff"/>
    <circle cx="118" cy="74" r="1" fill="#fff"/>
    <circle cx="98" cy="90" r="1.1" fill="#fff"/>
    <circle cx="84" cy="48" r="0.8" fill="#fff"/>
    <circle cx="128" cy="64" r="1.2" fill="#fff"/>
    <circle cx="138" cy="80" r="1" fill="#fff"/>
    <circle cx="72" cy="66" r="0.9" fill="#fff"/>
    <circle cx="148" cy="72" r="1.1" fill="#fff"/>
    <circle cx="112" cy="44" r="0.8" fill="#fff"/>
    <circle cx="158" cy="86" r="1" fill="#fff"/>
    <circle cx="178" cy="60" r="1.2" fill="#fff"/>
    <circle cx="192" cy="74" r="1" fill="#fff"/>
