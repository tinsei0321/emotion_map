  <polygon points="68,66 82,66 82,128 68,128" fill="url(#gor)" opacity="0.88"/>
  <polygon points="90,64 104,64 104,128 90,128" fill="url(#gy)" opacity="0.92"/>
  <polygon points="112,60 126,60 126,128 112,128" fill="url(#gor)" opacity="0.88"/>
  <polygon points="134,62 148,62 148,128 134,128" fill="url(#gr)" opacity="0.82"/>
  <polygon points="156,66 170,66 170,128 156,128" fill="url(#gdr)" opacity="0.76"/>
  <polygon points="178,70 192,70 192,128 178,128" fill="url(#gmag)" opacity="0.72"/>
  <polygon points="200,72 214,72 214,128 200,128" fill="url(#gdr)" opacity="0.66"/>
