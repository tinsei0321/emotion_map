    <linearGradient id="gmag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BC1F8C"/>
      <stop offset="100%" stop-color="#881460"/>
    </linearGradient>
    <linearGradient id="legend-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4C518"/>
      <stop offset="30%" stop-color="#F08828"/>
      <stop offset="55%" stop-color="#DC2440"/>
      <stop offset="80%" stop-color="#8E1D3C"/>
      <stop offset="100%" stop-color="#4F0F2A"/>
    </linearGradient>
  </defs>
  <rect width="280" height="180" fill="url(#gbg)"/>
  <!-- 3D 网格底线 -->
  <g opacity="0.08" stroke="#FFF" stroke-width="0.4">
    <line x1="14" y1="130" x2="266" y2="130"/>
