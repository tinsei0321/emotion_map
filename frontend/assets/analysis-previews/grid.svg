<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="gy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4C518"/>
      <stop offset="100%" stop-color="#D4990A"/>
    </linearGradient>
    <linearGradient id="gor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F08828"/>
      <stop offset="100%" stop-color="#C86818"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2440"/>
      <stop offset="100%" stop-color="#A4182C"/>
    </linearGradient>
    <linearGradient id="gdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8E1D3C"/>
      <stop offset="100%" stop-color="#5E1028"/>
