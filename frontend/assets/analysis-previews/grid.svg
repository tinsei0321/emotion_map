    <line x1="14" y1="114" x2="266" y2="114"/>
    <line x1="28" y1="100" x2="28" y2="146"/>
    <line x1="56" y1="96" x2="56" y2="146"/>
    <line x1="84" y1="92" x2="84" y2="146"/>
    <line x1="112" y1="90" x2="112" y2="146"/>
    <line x1="140" y1="88" x2="140" y2="146"/>
    <line x1="168" y1="90" x2="168" y2="146"/>
    <line x1="196" y1="92" x2="196" y2="146"/>
    <line x1="224" y1="96" x2="224" y2="146"/>
    <line x1="252" y1="100" x2="252" y2="146"/>
