  <rect x="56" y="52" width="16" height="68" fill="url(#gr)" opacity="0.7" rx="1"/>
  <rect x="78" y="46" width="16" height="74" fill="url(#gor)" opacity="0.75" rx="1"/>
  <rect x="100" y="42" width="16" height="78" fill="url(#gy)" opacity="0.8" rx="1"/>
  <rect x="122" y="40" width="16" height="80" fill="url(#gor)" opacity="0.75" rx="1"/>
  <rect x="144" y="48" width="16" height="72" fill="url(#gr)" opacity="0.7" rx="1"/>
  <rect x="166" y="54" width="16" height="66" fill="url(#gdr)" opacity="0.65" rx="1"/>
  <rect x="188" y="58" width="16" height="62" fill="url(#gdr)" opacity="0.6" rx="1"/>
  <rect x="210" y="62" width="16" height="58" fill="url(#gmag)" opacity="0.55" rx="1"/>
  <!-- 前排柱体 -->
