  <rect x="18" y="128" width="244" height="3" fill="#FFF" opacity="0.04" rx="1"/>
  <!-- 色阶图例 -->
  <rect x="16" y="152" width="110" height="7" rx="3.5" fill="url(#legend-g)"/>
  <text x="16" y="174" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="7.5" fill="#555">Low</text>
  <text x="126" y="174" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="7.5" fill="#555" text-anchor="end">High</text>
</svg>
