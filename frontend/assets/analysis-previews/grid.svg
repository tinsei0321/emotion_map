  <polygon points="38,72 52,62 66,72 52,82" fill="#F4C518" opacity="0.32"/>
  <polygon points="60,66 74,56 88,66 74,76" fill="#F08828" opacity="0.28"/>
  <polygon points="82,64 96,54 110,64 96,74" fill="#F4C518" opacity="0.32"/>
  <polygon points="104,60 118,50 132,60 118,70" fill="#F08828" opacity="0.28"/>
  <polygon points="126,62 140,52 154,62 140,72" fill="#DC2440" opacity="0.24"/>
  <polygon points="148,66 162,56 176,66 162,76" fill="#8E1D3C" opacity="0.22"/>
  <polygon points="170,70 184,60 198,70 184,80" fill="#BC1F8C" opacity="0.18"/>
