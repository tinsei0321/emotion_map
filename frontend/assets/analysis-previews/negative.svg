<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180">
  <defs>
    <radialGradient id="ng1" cx="42%" cy="48%" r="36%">
      <stop offset="0%" stop-color="#7A1E16" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#C44A2E" stop-opacity="0.65"/>
      <stop offset="60%" stop-color="#E88A6A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FDDACA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ng2" cx="70%" cy="60%" r="24%">
      <stop offset="0%" stop-color="#A3321A" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#E07142" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FDDACA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="legend-n" x1="0" y1="0" x2="1" y2="0">
