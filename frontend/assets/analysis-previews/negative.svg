    <circle cx="106" cy="92" r="1.2" fill="#E07142"/>
    <circle cx="90" cy="50" r="0.9" fill="#A3321A"/>
    <circle cx="136" cy="66" r="1.3" fill="#C44A2E"/>
    <circle cx="146" cy="82" r="1.1" fill="#E07142"/>
    <circle cx="76" cy="68" r="0.9" fill="#A3321A"/>
    <circle cx="156" cy="74" r="1.3" fill="#C44A2E"/>
    <circle cx="120" cy="46" r="0.9" fill="#A3321A"/>
    <circle cx="166" cy="88" r="1.1" fill="#E07142"/>
