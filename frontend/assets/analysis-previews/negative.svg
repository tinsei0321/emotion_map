  <path d="M0,86 Q70,80 140,90 T280,84" stroke="#252545" stroke-width="1.2" fill="none"/>
  <path d="M0,116 Q100,106 200,120 T280,112" stroke="#252545" stroke-width="0.8" fill="none"/>
  <path d="M95,0 Q88,55 98,110 T90,180" stroke="#252545" stroke-width="0.8" fill="none"/>
  <!-- 红色热力叠加 -->
  <rect width="280" height="180" fill="url(#ng1)"/>
  <rect width="280" height="180" fill="url(#ng2)"/>
