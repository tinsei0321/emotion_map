<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>情绪地图 · AI 问答</title>
  <!-- 设计 token（与主页面同源；ai_qa.css 用 --geojson-* 变量） -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/ai_qa.css" />
  <!-- marked：结论 markdown 渲染（defer 不阻塞解析；不可用时 panel.js 退纯文本） -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
</head>

<body class="aiq-window">
  <!-- AI 问答独立小窗主体（#chat-panel 与浮窗降级共用 id，panel.js 据此操作 DOM） -->
  <div id="chat-panel" class="chat-panel">
    <div class="chat-head">
      <span class="chat-title">情绪地图 · AI 问答</span>
      <span class="chat-subtitle">规划 / 更新 / 运营 / 治理 · 数据驱动</span>
      <span class="chat-head-spacer"></span>
      <button class="chat-icon-btn" id="chat-clear" title="清空对话" type="button">清空</button>
      <button class="chat-icon-btn" id="chat-close" title="关闭窗口" type="button">&times;</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <textarea id="chat-input" class="chat-input"
        placeholder="问：哪些区域情绪最差？为什么？&#10;（Enter 发送 / Shift+Enter 换行）" rows="2"></textarea>
      <button id="chat-send" class="chat-send" type="button">发送</button>
    </div>
  </div>

  <script type="module">
    // 独立窗入口：载 panel.js（与主页面浮窗降级共用），握手主窗口（BroadcastChannel）取 grounding。
    import { initChat } from './js/ai_qa/panel.js';
    document.addEventListener('DOMContentLoaded', () => initChat({ onClose: () => window.close() }));
  </script>
</body>

</html>
